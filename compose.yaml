services:
  postgres:
    image: postgres:16
    container_name: correos-uap-postgres
    environment:
      POSTGRES_DB: correos_uap
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - correos_uap_pgdata:/var/lib/postgresql/data

volumes:
  correos_uap_pgdata:
